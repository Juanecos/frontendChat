<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Velocity - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&amp;family=Inter:wght@400;500&amp;family=JetBrains+Mono:wght@400;500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-tint": "#acc7ff",
              "tertiary-fixed-dim": "#c3c6d0",
              "primary-fixed": "#d7e2ff",
              "tertiary-container": "#9396a0",
              surface: "#121416",
              "surface-dim": "#121416",
              "on-secondary-container": "#8db7f5",
              "on-secondary-fixed": "#001c3a",
              error: "#ffb4ab",
              "outline-variant": "#434751",
              "surface-container-low": "#1a1c1e",
              outline: "#8d909c",
              "on-secondary-fixed-variant": "#14477f",
              "on-primary-fixed": "#001a40",
              "surface-container": "#1e2022",
              "surface-variant": "#333537",
              "secondary-fixed-dim": "#a5c8ff",
              "primary-fixed-dim": "#acc7ff",
              "surface-bright": "#38393c",
              "on-tertiary": "#2c3038",
              "surface-container-high": "#282a2c",
              "surface-container-highest": "#333537",
              "on-tertiary-fixed-variant": "#43474f",
              "on-error": "#690005",
              "on-secondary": "#00315e",
              "inverse-primary": "#2c5dab",
              background: "#121416",
              primary: "#acc7ff",
              "surface-container-lowest": "#0c0e10",
              "inverse-surface": "#e2e2e5",
              "on-primary-container": "#002d65",
              "on-background": "#e2e2e5",
              "tertiary-fixed": "#dfe2ed",
              tertiary: "#c3c6d0",
              "on-tertiary-container": "#2b2f37",
              "error-container": "#93000a",
              "on-tertiary-fixed": "#181c23",
              "on-error-container": "#ffdad6",
              "primary-container": "#6a96e8",
              secondary: "#a5c8ff",
              "on-surface": "#e2e2e5",
              "on-surface-variant": "#c3c6d3",
              "on-primary": "#002f68",
              "inverse-on-surface": "#2f3133",
              "secondary-fixed": "#d4e3ff",
              "secondary-container": "#14477f",
              "on-primary-fixed-variant": "#024492",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              xl: "2rem",
              gutter: "1rem",
              base: "8px",
              md: "1rem",
              "margin-mobile": "1rem",
              sm: "0.5rem",
              lg: "1.5rem",
              xs: "0.25rem",
              "margin-desktop": "2.5rem",
            },
            fontFamily: {
              "body-lg": ["Sora"],
              "headline-lg": ["Sora"],
              "headline-xl": ["Sora"],
              "label-sm": ["Sora"],
              "label-md": ["Sora"],
              "title-md": ["Sora"],
              "headline-lg-mobile": ["Sora"],
              "body-md": ["Sora"],
            },
            fontSize: {
              "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              "headline-lg": [
                "32px",
                {
                  lineHeight: "40px",
                  letterSpacing: "-0.01em",
                  fontWeight: "600",
                },
              ],
              "headline-xl": [
                "48px",
                {
                  lineHeight: "56px",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              "label-sm": [
                "12px",
                {
                  lineHeight: "16px",
                  letterSpacing: "0.05em",
                  fontWeight: "600",
                },
              ],
              "label-md": [
                "14px",
                {
                  lineHeight: "20px",
                  letterSpacing: "0.05em",
                  fontWeight: "600",
                },
              ],
              "title-md": ["20px", { lineHeight: "28px", fontWeight: "600" }],
              "headline-lg-mobile": [
                "28px",
                { lineHeight: "36px", fontWeight: "600" },
              ],
              "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }],
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #121416;
        color: #e2e2e5;
        -webkit-font-smoothing: antialiased;
      }
      .glass-surface {
        background: rgba(30, 32, 34, 0.8);
        backdrop-filter: blur(16px);
      }
      .primary-glow {
        box-shadow: 0px 0px 16px rgba(106, 150, 232, 0.4);
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      body {
        min-height: 100dvh;
      }
    </style>
  </head>
  <body
    class="min-h-screen flex flex-col font-body-md text-body-md overflow-x-hidden bg-background text-on-background"
  >
    <!-- TopAppBar -->
    <header
      class="bg-surface/80 backdrop-blur-lg top-0 sticky border-b border-outline-variant/30 z-50"
    >
      <div
        class="flex justify-between items-center w-full px-md lg:px-margin-desktop h-16 max-w-7xl mx-auto"
      >
        <div class="flex items-center gap-base">
          <span class="material-symbols-outlined text-primary" data-icon="bolt"
            >bolt</span
          >
          <span
            class="font-headline-lg text-headline-lg font-bold tracking-tighter text-primary"
            >Velocity</span
          >
        </div>
        <nav class="hidden md:flex gap-md">
          <a
            class="text-on-surface-variant hover:bg-surface-container-high/50 transition-colors px-base py-xs rounded"
            href="#"
            >Support</a
          >
          <a
            class="text-on-surface-variant hover:bg-surface-container-high/50 transition-colors px-base py-xs rounded"
            href="#"
            >Privacy</a
          >
        </nav>
      </div>
    </header>
    <!-- Main Content Canvas -->
    <main
      class="flex-grow flex items-center justify-center relative p-md lg:p-margin-desktop"
    >
      <!-- Abstract Background Visuals -->
      <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div
          class="absolute top-[-10%] right-[-5%] w-[500px] h-[500px] rounded-full bg-primary-container/10 blur-[120px]"
        ></div>
        <div
          class="absolute bottom-[-10%] left-[-5%] w-[400px] h-[400px] rounded-full bg-secondary-container/5 blur-[100px]"
        ></div>
      </div>
      <!-- Login Card -->
      <div
        class="glass-surface w-full max-w-[440px] p-lg rounded-xl border border-outline-variant/20 relative z-10 flex flex-col gap-md"
      >
        <div class="text-center">
          <h1 class="font-title-md text-title-md text-on-surface mb-xs">
            Welcome back
          </h1>
          <p class="font-body-md text-body-md text-on-surface-variant">
            Sign in to your high-performance workspace
          </p>
        </div>
        <!-- Social Login Buttons -->
        <div class="grid grid-cols-2 gap-gutter">
          <button
            class="flex items-center justify-center gap-base py-sm px-md rounded-lg border border-outline-variant/40 hover:bg-surface-container-highest/50 transition-colors group"
          >
            <span
              class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors"
              data-icon="google"
              >google</span
            >
            <span class="font-label-md text-label-md text-on-surface"
              >Google</span
            >
          </button>
          <button
            class="flex items-center justify-center gap-base py-sm px-md rounded-lg border border-outline-variant/40 hover:bg-surface-container-highest/50 transition-colors group"
          >
            <span
              class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors"
              data-icon="apple"
              >ios</span
            >
            <span class="font-label-md text-label-md text-on-surface"
              >Apple</span
            >
          </button>
        </div>
        <div class="flex items-center gap-md py-xs">
          <div class="h-[1px] flex-grow bg-outline-variant/30"></div>
          <span class="font-label-sm text-label-sm text-on-surface-variant/60"
            >OR EMAIL</span
          >
          <div class="h-[1px] flex-grow bg-outline-variant/30"></div>
        </div>
        <!-- Login Form -->
        <form class="flex flex-col gap-md">
          <div class="flex flex-col gap-xs">
            <label
              class="font-label-sm text-label-sm text-on-surface-variant ml-xs"
              for="email"
              >Email Address</label
            >
            <div class="relative">
              <input
                class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-lg px-md py-sm focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-on-surface-variant/40 text-on-surface"
                id="email"
                placeholder="name@velocity.app"
                type="email"
              />
            </div>
          </div>
          <div class="flex flex-col gap-xs">
            <div class="flex justify-between items-center px-xs">
              <label
                class="font-label-sm text-label-sm text-on-surface-variant"
                for="password"
                >Password</label
              >
              <a
                class="font-label-sm text-label-sm text-primary hover:underline"
                href="#"
                >Forgot Password?</a
              >
            </div>
            <div class="relative">
              <input
                class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-lg px-md py-sm focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-on-surface-variant/40 text-on-surface"
                id="password"
                placeholder="••••••••"
                type="password"
              />
              <button
                class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant/60 hover:text-on-surface transition-colors"
                type="button"
              >
                <span
                  class="material-symbols-outlined text-[20px]"
                  data-icon="visibility"
                  >visibility</span
                >
              </button>
            </div>
          </div>
          <div class="flex items-center gap-sm px-xs mt-xs">
            <input
              class="w-4 h-4 rounded border-outline-variant/40 bg-surface-container-lowest text-primary focus:ring-offset-surface"
              id="remember"
              type="checkbox"
            />
            <label
              class="font-body-md text-body-md text-on-surface-variant select-none"
              for="remember"
              >Remember this device</label
            >
          </div>
          <button
            class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md py-sm rounded-lg primary-glow hover:opacity-90 active:scale-[0.98] transition-all duration-200 mt-base"
            type="submit"
          >
            Log In
          </button>
        </form>
        <div class="text-center mt-base">
          <p class="font-body-md text-body-md text-on-surface-variant">
            Don't have an account?
            <a class="text-primary font-bold hover:underline ml-xs" href="#"
              >Sign Up</a
            >
          </p>
        </div>
      </div>
    </main>
    <!-- Footer -->
    <footer
      class="w-full py-md px-md lg:px-margin-desktop flex flex-col md:flex-row justify-between items-center gap-base bg-surface border-t border-outline-variant/20 z-50"
    >
      <div class="flex items-center gap-base">
        <span class="font-label-md text-label-md font-bold text-on-surface"
          >Velocity</span
        >
        <span class="font-label-sm text-label-sm text-on-surface-variant"
          >© 2024 Midnight Velocity. All rights reserved.</span
        >
      </div>
      <div class="flex gap-md">
        <a
          class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors"
          href="#"
          >Privacy Policy</a
        >
        <a
          class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors"
          href="#"
          >Terms of Service</a
        >
        <a
          class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors"
          href="#"
          >Help Center</a
        >
      </div>
    </footer>
    <!-- Imagery/Decorations -->
    <div
      class="fixed bottom-margin right-margin w-64 h-64 opacity-10 pointer-events-none hidden lg:block"
    >
      <img
        alt="Abstract aesthetic matching the high-end tech aesthetic"
        class="w-full h-full object-cover rounded-full mix-blend-screen"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuDX-0sRrBd1Kdw691jwj75OAJENtQ7XPDFcnHpSSGzfiPxUT_cSu9XIUQ2vJcL4c9X89ac0V22Y694dawH9HeAXcuE07Fj-L-JHLLv_0018Ep40GR0G_cIzQJM9rAgZNs90n-mtubAkPvkOOLXfPFI3Beg-Vr5myTuds62E05XdbhcS1TTxonrxGoyYgkPF_fm1I25x1git8dIipztVuJ8LBOZB0V_zpMPztvhQO452uWjqm81jV1gKOkJ0Mr8TTeDrGrIxx91oZeCF"
      />
    </div>
  </body>
</html>
